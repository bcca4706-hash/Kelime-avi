<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süper Oyun Portalı</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .screen { display: none; padding: 20px; width: 100%; max-width: 400px; }
        .active { display: block; }
        .btn { padding: 15px 30px; margin: 10px; border-radius: 15px; border: none; background: #e94560; color: white; font-weight: bold; cursor: pointer; }
        .game-area { border: 2px solid #555; padding: 20px; border-radius: 20px; margin-top: 10px; }
        .box { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; display: inline-flex; align-items: center; justify-content: center; margin: 2px; }
        .keyboard-row { display: flex; justify-content: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="menu" class="screen active">
    <h1>Oyun Portalı</h1>
    <button class="btn" onclick="showGame('kelime')">Kelime Avı</button>
    <button class="btn" onclick="showGame('blok')">Blok Kırma</button>
    <button class="btn" onclick="showGame('puzzle')">Puzzle</button>
    <p id="stats">Toplam Skor: 0</p>
</div>

<div id="game-kelime" class="screen">
    <h2>Kelime Avı</h2>
    <div id="soru">Soru: Osmanlı'nın başkenti?</div>
    <div id="grid"></div>
    <div id="keyboard"></div>
    <button class="btn" onclick="showGame('menu')">Geri Dön</button>
</div>

<div id="game-blok" class="screen"><h2>Blok Kırma (Geliştiriliyor)</h2><button class="btn" onclick="showGame('menu')">Geri Dön</button></div>
<div id="game-puzzle" class="screen"><h2>Puzzle (Geliştiriliyor)</h2><button class="btn" onclick="showGame('menu')">Geri Dön</button></div>

<script>
    let state = { skor: 0 };
    const clickSound = new Audio('https://actions.google.com/sounds/v1/ui/click.ogg');

    function showGame(game) {
        clickSound.play();
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('game-' + game)?.classList.add('active');
        if(game === 'menu') document.getElementById('menu').classList.add('active');
    }

    // 2 Sıralı Klavye
    const row1 = "ABCÇDEFGĞHIİJ".split("");
    const row2 = "KLMNOÖPRSŞTUÜVYZ".split("");
    
    function initKeyboard() {
        const kb = document.getElementById('keyboard');
        [row1, row2].forEach(row => {
            let r = document.createElement('div'); r.className = 'keyboard-row';
            row.forEach(h => {
                r.innerHTML += `<div class="box" onclick="clickSound.play()">${h}</div>`;
            });
            kb.appendChild(r);
        });
    }
    initKeyboard();
</script>
</body>
</html>
