<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Avı</title>
    <style>
        body { background: #2c3e50; color: white; font-family: sans-serif; text-align: center; padding: 10px; }
        #timer { font-size: 24px; color: #f1c40f; margin: 10px 0; font-weight: bold; }
        #soru { font-size: 20px; margin: 20px 0; min-height: 50px; color: #ecf0f1; }
        #grid { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .letter-box { width: 50px; height: 50px; text-align: center; font-size: 24px; text-transform: uppercase; border: 2px solid #bdc3c7; border-radius: 8px; background: #34495e; color: white; }
        #keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; max-width: 450px; margin: 20px auto; }
        .key { padding: 15px 5px; background: #95a5a6; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .key:active { background: #1abc9c; }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; background: #27ae60; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Kelime Avı</h1>
    <div id="timer">Kalan Süre: 07:00</div>
    <div id="soru">Hazırsan Başla'ya bas!</div>
    <div id="grid"></div>
    <div id="keyboard"></div>
    <button onclick="startGame()">Oyunu Başlat</button>

    <script src="oyun.js"></script>
</body>
</html>
