<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Avı PRO</title>
    <style>
        body { margin: 0; background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') center/cover fixed; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        #app { background: rgba(0,0,0,0.85); padding: 25px; border-radius: 30px; width: 90%; max-width: 450px; text-align: center; border: 1px solid #444; }
        #hud { display: flex; justify-content: space-between; font-weight: bold; color: #f1c40f; margin-bottom: 20px; }
        #soru { font-size: 19px; margin-bottom: 25px; min-height: 50px; line-height: 1.4; }
        #grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .box { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 20px; background: rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .box.filled { background: #f1c40f; color: black; border-color: #d35400; }
        #keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .key { padding: 12px 0; background: rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer; font-weight: bold; }
        .controls { display: flex; justify-content: space-around; margin-top: 25px; align-items: center; }
        #ampul { font-size: 35px; cursor: pointer; }
        button { background: #e74c3c; border: none; color: white; padding: 10px 20px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div id="hud">
            <div id="skor">Skor: 0</div>
            <div id="timer">07:00</div>
        </div>
        <div id="level-info">Bölüm: 1</div>
        <div id="soru"></div>
        <div id="grid"></div>
        <div id="keyboard"></div>
        <div class="controls">
            <span id="ampul" onclick="joker()">💡</span>
            <button onclick="nextLevel()">Soru Geç</button>
        </div>
    </div>

    <script>
        const sorular = [
            { kelime: "İSTANBUL", ipucu: "Tarih: Osmanlı'nın başkenti" },
            { kelime: "ANKARA", ipucu: "Tarih: Türkiye'nin başkenti" },
            { kelime: "MATEMATİK", ipucu: "Bilim: Sayısal işlemler" },
            { kelime: "GÜNEŞ", ipucu: "Doğa: Isı kaynağı" },
            { kelime: "KİTAP", ipucu: "Kültür: Bilgi kaynağı" },
            { kelime: "DENİZ", ipucu: "Doğa: Mavi su" }
            // Buraya istediğin kadar soru ekleyebilirsin...
        ];
        
        let currentLevel = 0, sure = 420, skor = 0;

        function startGame() {
            let q = sorular[currentLevel % sorular.length];
            document.getElementById('level-info').innerText = "Bölüm: " + (currentLevel + 1);
            document.getElementById('soru').innerText = q.ipucu;
            let grid = document.getElementById('grid'); grid.innerHTML = '';
            for(let i=0; i<q.kelime.length; i++) {
                let b = document.createElement('div'); b.className = 'box';
                b.onclick = () => { b.innerText = ""; b.className = 'box'; }; // Tıklayınca harfi siler
                grid.appendChild(b);
            }
        }

        "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ".split('').forEach(h => {
            document.getElementById('keyboard').innerHTML += `<div class="key" onclick="harfGir('${h}')">${h}</div>`;
        });

        function harfGir(h) {
            let boxes = document.querySelectorAll('.box');
            for(let b of boxes) {
                if(b.innerText === "") { b.innerText = h; b.classList.add('filled'); kontrolEt(); break; }
            }
        }

        function kontrolEt() {
            let tahmin = Array.from(document.querySelectorAll('.box')).map(b => b.innerText).join("");
            if(tahmin === sorular[currentLevel % sorular.length].kelime) {
                skor += 100; document.getElementById('skor').innerText = "Skor: " + skor;
                alert("Tebrikler!"); nextLevel();
            }
        }

        function nextLevel() { currentLevel++; startGame(); }

        function joker() {
            let q = sorular[currentLevel % sorular.length];
            let boxes = document.querySelectorAll('.box');
            for(let i=0; i<boxes.length; i++) {
                if(boxes[i].innerText === "") { boxes[i].innerText = q.kelime[i]; boxes[i].classList.add('filled'); break; }
            }
        }

        setInterval(() => {
            sure--; let m = Math.floor(sure/60), s = sure%60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(sure <= 0) alert("Süre Bitti!");
        }, 1000);

        startGame();
    </script>
</body>
</html>
