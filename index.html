<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Oyun Portalı</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #menu { padding: 20px; text-align: center; }
        .game-screen { display: none; padding: 20px; text-align: center; width: 100%; max-width: 400px; }
        .btn { padding: 15px 30px; margin: 10px; border-radius: 10px; border: none; background: #e74c3c; color: white; cursor: pointer; }
        #grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 20px 0; }
        .box { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); }
        .keyboard-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="menu">
    <h1>Oyun Portalı</h1>
    <button class="btn" onclick="showGame('kelime')">Kelime Avı</button>
    <button class="btn" onclick="showGame('blok')">Blok Kırma</button>
    <button class="btn" onclick="showGame('puzzle')">Parça Yerleştir</button>
</div>

<!-- Kelime Avı -->
<div id="game-kelime" class="game-screen">
    <h2>Kelime Avı</h2>
    <div id="soru"></div>
    <div id="grid"></div>
    <div id="keyboard"></div>
    <button onclick="pauseGame()">Duraklat</button>
    <button onclick="nextLevel()">Sonraki</button>
</div>

<script>
    let state = { current: 'menu', kelimeLevel: 0, blokSkor: 0, puzzleSkor: 0 };
    
    // Ses Efekti Tanımı
    const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-1.mp3');

    function showGame(game) {
        clickSound.play();
        document.getElementById('menu').style.display = 'none';
        document.querySelectorAll('.game-screen').forEach(s => s.style.display = 'none');
        document.getElementById('game-' + game).style.display = 'block';
        state.current = game;
    }

    function pauseGame() { alert("Oyun Duraklatıldı!"); }

    function nextLevel() { state.kelimeLevel++; alert("Yeni soruya geçildi!"); }

    // Klavye Düzeni (2 Sıra)
    const row1 = "ABCÇDEFGĞHIİJ".split("");
    const row2 = "KLMNOÖPRSŞTUÜVYZ".split("");
    
    function createKeyboard() {
        const kb = document.getElementById('keyboard');
        [row1, row2].forEach(row => {
            let div = document.createElement('div'); div.className = 'keyboard-row';
            row.forEach(h => {
                div.innerHTML += `<div class="box" onclick="clickSound.play()">${h}</div>`;
            });
            kb.appendChild(div);
        });
    }

    createKeyboard();
</script>
</body>
</html>
