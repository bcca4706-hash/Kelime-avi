<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kelime Avı - 100 Bölüm</title>
    <style>
        body { margin: 0; background: url('https://source.unsplash.com/1600x900/?city') no-repeat center center fixed; background-size: cover; color: white; font-family: sans-serif; text-align: center; }
        #overlay { background: rgba(0,0,0,0.7); min-height: 100vh; padding: 20px; }
        #timer { font-size: 32px; font-weight: bold; color: #f1c40f; margin: 15px; }
        .red-alert { color: red !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        #soru { font-size: 24px; margin: 20px 0; min-height: 40px; }
        #grid { display: flex; justify-content: center; gap: 10px; margin: 30px; }
        .box { width: 50px; height: 50px; border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(255,255,255,0.2); }
        #keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; max-width: 450px; margin: 40px auto; }
        .key { padding: 15px; background: rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="level-info">Bölüm: 1</div>
        <div id="timer">07:00</div>
        <div id="soru">OYUNU BAŞLAT'A BASIN</div>
        <div id="grid"></div>
        <div id="keyboard"></div>
        <button onclick="startGame()" style="padding:15px 30px; font-size:18px;">OYUNU BAŞLAT</button>
        <canvas id="fireworks" style="position:fixed; top:0; left:0; pointer-events:none;"></canvas>
    </div>
    <script src="oyun.js"></script>
</body>
</html>
