<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kelime Avı Pro</title>
    <style>
        body { margin: 0; background: url('https://source.unsplash.com/1600x900/?city,landscape') no-repeat center center fixed; background-size: cover; color: white; font-family: 'Arial', sans-serif; text-align: center; }
        #overlay { background: rgba(0,0,0,0.6); min-height: 100vh; padding: 20px; }
        #timer { font-size: 30px; font-weight: bold; margin: 10px; padding: 10px; border-radius: 20px; transition: 0.5s; }
        .red-alert { background: red !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        #grid { display: flex; justify-content: center; gap: 10px; margin: 30px; }
        .letter-box { width: 50px; height: 50px; border-radius: 50%; border: 3px solid white; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #keyboard { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 400px; margin: 20px auto; }
        .key { padding: 10px; background: rgba(255,255,255,0.3); border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="level-info">Bölüm 1</div>
        <div id="timer">07:00</div>
        <div id="soru"></div>
        <div id="grid"></div>
        <div id="joker-bar"><button onclick="jokerKullan()">Joker (Harf Al)</button></div>
        <div id="keyboard"></div>
    </div>
    <script src="oyun.js"></script>
</body>
</html>
